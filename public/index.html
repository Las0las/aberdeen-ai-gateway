<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aberdeen AI Gateway — NorthStar Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0a0b0f;--bg-secondary:#12141a;--bg-tertiary:#1a1d26;--bg-elevated:#1e2130;
  --text-primary:#e8eaf0;--text-secondary:#8b8fa3;--text-muted:#555873;
  --accent:#00d4aa;--accent-dim:rgba(0,212,170,0.12);--accent-glow:rgba(0,212,170,0.25);
  --danger:#ff4d6a;--warning:#ffb443;--info:#4da6ff;--success:#00d4aa;
  --border:rgba(255,255,255,0.06);--border-active:rgba(0,212,170,0.3);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,0.3);--shadow-lg:0 12px 48px rgba(0,0,0,0.5);
  --font-sans:'DM Sans',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;--font-serif:'Instrument Serif',serif;
  --transition:180ms cubic-bezier(0.4,0,0.2,1);
}
html,body{height:100%;font-family:var(--font-sans);background:var(--bg-primary);color:var(--text-primary);overflow:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:var(--bg-primary)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--accent-glow)}50%{box-shadow:0 0 20px var(--accent-glow)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes typing{0%{width:0}100%{width:100%}}
@keyframes blink{0%,50%{border-color:var(--accent)}51%,100%{border-color:transparent}}

.app{display:grid;grid-template-columns:280px 1fr 320px;grid-template-rows:56px 1fr;height:100vh;gap:0}
.app.sidebar-collapsed{grid-template-columns:64px 1fr 320px}
.app.panel-collapsed{grid-template-columns:280px 1fr 0}
.app.sidebar-collapsed.panel-collapsed{grid-template-columns:64px 1fr 0}

/* Header */
.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border);z-index:100}
.header-brand{display:flex;align-items:center;gap:12px}
.header-logo{width:32px;height:32px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#00a88a);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--bg-primary);letter-spacing:-0.5px}
.header-title{font-family:var(--font-serif);font-size:20px;font-weight:400;letter-spacing:-0.3px}
.header-title em{color:var(--accent);font-style:italic}
.header-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)}
.header-status .dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s ease-in-out infinite}
.header-actions{display:flex;align-items:center;gap:8px}
.header-kbd{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;background:var(--bg-tertiary);border:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);cursor:pointer;transition:var(--transition)}
.header-kbd:hover{border-color:var(--border-active);color:var(--text-secondary)}

/* Sidebar */
.sidebar{grid-row:2;display:flex;flex-direction:column;background:var(--bg-secondary);border-right:1px solid var(--border);overflow:hidden;transition:width var(--transition)}
.sidebar-search{padding:12px;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);font-size:13px;font-family:var(--font-sans);outline:none;transition:var(--transition)}
.sidebar-search input:focus{border-color:var(--border-active);box-shadow:0 0 0 3px var(--accent-dim)}
.sidebar-search input::placeholder{color:var(--text-muted)}
.sidebar-categories{flex:1;overflow-y:auto;padding:8px}
.sidebar-cat{margin-bottom:4px}
.sidebar-cat-header{display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition)}
.sidebar-cat-header:hover{color:var(--text-secondary);background:rgba(255,255,255,0.02)}
.sidebar-cat-header .count{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:10px;background:var(--bg-tertiary);font-weight:500}
.agent-item{display:flex;align-items:center;gap:10px;padding:8px 10px;margin:2px 0;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);position:relative}
.agent-item:hover{background:rgba(255,255,255,0.04)}
.agent-item.active{background:var(--accent-dim);border:1px solid var(--border-active)}
.agent-item .avatar{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.agent-item .info{flex:1;min-width:0}
.agent-item .name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-item .desc{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-item .tier{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;letter-spacing:0.5px}
.tier-1{background:rgba(255,183,77,0.15);color:#ffb74d}
.tier-2{background:rgba(77,166,255,0.15);color:#4da6ff}
.tier-3{background:rgba(139,143,163,0.15);color:#8b8fa3}

/* Main Chat Area */
.main{grid-row:2;display:flex;flex-direction:column;background:var(--bg-primary);position:relative;overflow:hidden}
.main::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,var(--accent-dim),transparent 60%);pointer-events:none;opacity:0.4}

.chat-header{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--border);position:relative;z-index:1}
.chat-header .agent-icon{width:40px;height:40px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:20px}
.chat-header .agent-info h2{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.chat-header .agent-info h2 .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:0.5px;background:var(--accent-dim);color:var(--accent)}
.chat-header .agent-info p{font-size:12px;color:var(--text-secondary);margin-top:2px}
.chat-header-actions{margin-left:auto;display:flex;gap:6px}
/* Messages */
.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1}
.msg{max-width:85%;animation:fadeUp 0.3s ease-out;display:flex;gap:10px}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
.msg .avatar-sm{width:28px;height:28px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.msg.user .avatar-sm{background:var(--bg-elevated);color:var(--text-secondary)}
.msg.assistant .avatar-sm{background:var(--accent-dim);color:var(--accent)}
.msg .bubble{padding:12px 16px;border-radius:var(--radius-lg);font-size:14px;line-height:1.65;letter-spacing:-0.1px}
.msg.user .bubble{background:var(--accent);color:var(--bg-primary);border-bottom-right-radius:4px}
.msg.assistant .bubble{background:var(--bg-elevated);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.assistant .bubble code{font-family:var(--font-mono);font-size:12px;background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px}
.msg.system{align-self:center;max-width:90%}
.msg.system .bubble{background:transparent;border:1px dashed var(--border);color:var(--text-muted);font-size:12px;text-align:center;font-family:var(--font-mono)}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:pulse 1.4s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}

/* Input */
.input-area{padding:16px 24px;border-top:1px solid var(--border);position:relative;z-index:1}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-field{flex:1;position:relative}
.input-field textarea{width:100%;padding:12px 16px;padding-right:44px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:14px;font-family:var(--font-sans);resize:none;outline:none;min-height:46px;max-height:160px;line-height:1.5;transition:var(--transition)}
.input-field textarea:focus{border-color:var(--border-active);box-shadow:0 0 0 3px var(--accent-dim)}
.input-field textarea::placeholder{color:var(--text-muted)}
.send-btn{width:46px;height:46px;border-radius:var(--radius);border:none;background:var(--accent);color:var(--bg-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0}
.send-btn:hover{background:#00e8ba;transform:scale(1.04)}
.send-btn:active{transform:scale(0.96)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px}
.input-hints{display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--text-muted)}
.input-hints span{display:flex;align-items:center;gap:4px}

/* Right Panel */
.panel{grid-row:2;display:flex;flex-direction:column;background:var(--bg-secondary);border-left:1px solid var(--border);overflow:hidden;transition:width var(--transition)}
.panel-tabs{display:flex;border-bottom:1px solid var(--border)}
.panel-tab{flex:1;padding:10px 12px;font-size:12px;font-weight:500;color:var(--text-muted);background:transparent;border:none;cursor:pointer;text-align:center;transition:var(--transition);border-bottom:2px solid transparent}
.panel-tab:hover{color:var(--text-secondary)}
.panel-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel-content{flex:1;overflow-y:auto;padding:16px}

/* Policy Cards */
.policy-card{padding:12px;border-radius:var(--radius-sm);background:var(--bg-tertiary);border:1px solid var(--border);margin-bottom:8px;transition:var(--transition)}
.policy-card:hover{border-color:rgba(255,255,255,0.1)}
.policy-card .policy-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.policy-card .policy-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.policy-card .policy-desc{font-size:11px;color:var(--text-muted);line-height:1.5}

/* Toggle Switch */
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{display:none}
.toggle .slider{position:absolute;inset:0;background:var(--bg-primary);border-radius:10px;border:1px solid var(--border);transition:var(--transition)}
.toggle .slider::before{content:'';position:absolute;width:14px;height:14px;left:2px;bottom:2px;border-radius:50%;background:var(--text-muted);transition:var(--transition)}
.toggle input:checked+.slider{background:var(--accent-dim);border-color:var(--border-active)}
.toggle input:checked+.slider::before{transform:translateX(16px);background:var(--accent)}
/* Event Stream */
.event-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);animation:slideIn 0.3s ease-out}
.event-item:last-child{border-bottom:none}
.event-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.event-item .event-text{font-size:12px;color:var(--text-secondary);line-height:1.5}
.event-item .event-time{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}

/* DLQ */
.dlq-item{padding:10px;border-radius:var(--radius-sm);background:rgba(255,77,106,0.06);border:1px solid rgba(255,77,106,0.15);margin-bottom:8px}
.dlq-item .dlq-reason{font-size:12px;color:var(--danger);font-weight:500;margin-bottom:4px}
.dlq-item .dlq-msg{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.dlq-item .dlq-actions{display:flex;gap:6px}

/* Metrics */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.metric-card{padding:12px;border-radius:var(--radius-sm);background:var(--bg-tertiary);border:1px solid var(--border)}
.metric-card .metric-value{font-size:22px;font-weight:700;font-family:var(--font-mono);letter-spacing:-1px}
.metric-card .metric-label{font-size:11px;color:var(--text-muted);margin-top:2px}

/* Command Palette */
.cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:20vh;animation:fadeIn 0.15s ease-out}
.cmd-palette{width:520px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.cmd-input{width:100%;padding:16px 20px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text-primary);font-size:15px;font-family:var(--font-sans);outline:none}
.cmd-input::placeholder{color:var(--text-muted)}
.cmd-results{max-height:300px;overflow-y:auto;padding:8px}
.cmd-result{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition)}
.cmd-result:hover,.cmd-result.focused{background:var(--accent-dim)}
.cmd-result .cmd-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.cmd-result .cmd-name{font-size:13px;font-weight:500}
.cmd-result .cmd-cat{font-size:11px;color:var(--text-muted)}
/* Custom Agent Builder */
.builder-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:900;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s ease-out}
.builder{width:640px;max-height:80vh;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);display:flex;flex-direction:column}
.builder-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.builder-header h3{font-size:16px;font-weight:600}
.builder-steps{display:flex;gap:0;padding:0 24px;border-bottom:1px solid var(--border)}
.builder-step{flex:1;padding:12px 0;font-size:12px;color:var(--text-muted);text-align:center;position:relative;transition:var(--transition)}
.builder-step.active{color:var(--accent)}
.builder-step.done{color:var(--text-secondary)}
.builder-step::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:transparent;transition:var(--transition)}
.builder-step.active::after{background:var(--accent)}
.builder-step.done::after{background:var(--text-muted)}
.builder-body{flex:1;overflow-y:auto;padding:24px}
.builder-body label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;margin-top:16px}
.builder-body label:first-child{margin-top:0}
.builder-body input,.builder-body textarea,.builder-body select{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);font-size:13px;font-family:var(--font-sans);outline:none;transition:var(--transition)}
.builder-body input:focus,.builder-body textarea:focus,.builder-body select:focus{border-color:var(--border-active);box-shadow:0 0 0 3px var(--accent-dim)}
.builder-body textarea{min-height:100px;resize:vertical;font-family:var(--font-mono);font-size:12px}
.builder-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:space-between}
/* Buttons */
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);font-size:13px;font-family:var(--font-sans);cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;gap:6px;font-weight:500}
.btn:hover{background:var(--bg-elevated);border-color:rgba(255,255,255,0.1)}
.btn-primary{background:var(--accent);color:var(--bg-primary);border-color:var(--accent)}
.btn-primary:hover{background:#00e8ba;border-color:#00e8ba}
.btn-danger{color:var(--danger);border-color:rgba(255,77,106,0.3)}
.btn-danger:hover{background:rgba(255,77,106,0.1)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;transition:var(--transition)}
.btn-icon:hover{background:var(--bg-tertiary);color:var(--text-primary)}

/* FIN-LOCK Badge */
.finlock-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.8px;font-family:var(--font-mono)}
.finlock-active{background:rgba(255,77,106,0.12);color:var(--danger);border:1px solid rgba(255,77,106,0.25)}
.finlock-clear{background:rgba(0,212,170,0.12);color:var(--success);border:1px solid rgba(0,212,170,0.25)}

/* Welcome Screen */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;position:relative;z-index:1}
.welcome h1{font-family:var(--font-serif);font-size:42px;font-weight:400;letter-spacing:-1px;margin-bottom:8px}
.welcome h1 em{color:var(--accent);font-style:italic}
.welcome p{color:var(--text-secondary);font-size:15px;max-width:480px;line-height:1.6;margin-bottom:32px}
.welcome-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:600px}
.welcome-card{padding:16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-secondary);text-align:left;cursor:pointer;transition:var(--transition)}
.welcome-card:hover{border-color:var(--border-active);transform:translateY(-2px);box-shadow:var(--shadow)}
.welcome-card .wc-icon{font-size:20px;margin-bottom:8px}
.welcome-card .wc-title{font-size:13px;font-weight:600;margin-bottom:4px}
.welcome-card .wc-desc{font-size:11px;color:var(--text-muted);line-height:1.5}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.5/babel.min.js"></script>
<script type="text/babel" data-type="module">
const { useState, useReducer, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

// ─── Configuration ───────────────────────────────────────────
const CONFIG = {
  ANTHROPIC_MODEL: 'claude-sonnet-4-20250514',
  SUPABASE_URL: '',      // Set your Supabase URL
  SUPABASE_KEY: '',      // Set your Supabase anon key
  ANTHROPIC_KEY: '',     // Set your Anthropic API key
  MAX_RETRIES: 3,
  RATE_LIMIT_MS: 1000,
  SESSION_KEY: 'gw-state',
  VERSION: '2.0.0'
};

// ─── Agent Categories ────────────────────────────────────────
const CATEGORIES = [
  { id: 'enterprise-platforms', name: 'Enterprise Platforms', icon: '🏢', color: '#4da6ff' },
  { id: 'data-intelligence', name: 'Data Intelligence', icon: '📊', color: '#b47aff' },
  { id: 'ai-engineering', name: 'AI Engineering', icon: '🤖', color: '#00d4aa' },
  { id: 'delivery-management', name: 'Delivery Management', icon: '📦', color: '#ff8a65' },
  { id: 'strategy-advisory', name: 'Strategy & Advisory', icon: '🎯', color: '#ffb443' },
  { id: 'certifications', name: 'Certifications', icon: '🏅', color: '#4dd0e1' },
  { id: 'design-experience', name: 'Design & Experience', icon: '🎨', color: '#f06292' },
  { id: 'engineering-ops', name: 'Engineering & Ops', icon: '⚙️', color: '#90a4ae' },
  { id: 'talent-operations', name: 'Talent Operations', icon: '👥', color: '#aed581' }
];
// ─── Agent Definitions ───────────────────────────────────────
const AGENTS = [
  // Enterprise Platforms
  { id:'sap-specialist', name:'SAP SuccessFactors', cat:'enterprise-platforms', tier:1, icon:'💼', color:'#4da6ff', rate:'$85-145/hr', demand:'High',

  { id:'pii-redaction', name:'PII Redaction', icon:'🔒', desc:'Automatically redacts SSN, email, phone, and address patterns from messages before processing', enabled:true,
    check: (msg) => { const patterns = [/\b\d{3}-\d{2}-\d{4}\b/g, /\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/gi, /\b\d{3}[-.]?\d{3}[-.]?\d{4}\b/g];
      let redacted = msg; let found = [];
      patterns.forEach(p => { const m = msg.match(p); if(m) { found.push(...m); redacted = redacted.replace(p, '[REDACTED]'); }});
      return { clean: redacted, violations: found.length > 0 ? [`PII detected: ${found.length} pattern(s) redacted`] : [] }; }},

// ─── FIN-LOCK Financial Guardrails ───────────────────────────
const FINLOCK = {
  marginFloor: 0.25,
  rateCeiling: 250,
  costLimit: 50000,
  check: (msg) => {
    const warnings = [];
    const rateMatch = msg.match(/\$(\d+)\s*(?:\/hr|per hour|hourly)/i);
    if (rateMatch && parseInt(rateMatch[1]) > FINLOCK.rateCeiling) warnings.push(`Rate $${rateMatch[1]}/hr exceeds ceiling of $${FINLOCK.rateCeiling}/hr`);
    const costMatch = msg.match(/\$(\d{1,3}(?:,\d{3})*|\d+)(?:\s|$)/g);
    if (costMatch) { costMatch.forEach(c => { const val = parseInt(c.replace(/[$,]/g, '')); if (val > FINLOCK.costLimit) warnings.push(`Cost $${val.toLocaleString()} exceeds limit of $${FINLOCK.costLimit.toLocaleString()}`); }); }
    return { active: warnings.length > 0, warnings };
  }
};

// ─── Agent Router (keyword scoring) ─────────────────────────
function routeMessage(msg, agents) {
  const lower = msg.toLowerCase();
  const scores = agents.map(agent => {
    let score = 0;
    (agent.kw || []).forEach(kw => {
      if (lower.includes(kw.toLowerCase())) {
        score += kw.includes(' ') ? 3 : 2; // multi-word keywords score higher
      }
    });
    (agent.tags || []).forEach(tag => {
      if (lower.includes(tag.toLowerCase())) score += 1;
    });
    if (agent.tier === 1) score *= 1.1;
    return { agent, score };
  });
  scores.sort((a, b) => b.score - a.score);
  return scores[0]?.score > 0 ? scores[0].agent : null;
}

// ─── Supabase Data Bridge ────────────────────────────────────
async function querySupabase(msg) {
  if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_KEY) return null;
  const lower = msg.toLowerCase();
  let table = null, filters = {};
  if (/candidate|applicant|resume|talent/.test(lower)) table = 'candidates';
  else if (/job|position|role|opening|requisition/.test(lower)) table = 'jobs';
  else if (/placement|hire|onboard/.test(lower)) table = 'placements';
  if (!table) return null;
  try {
    const url = `${CONFIG.SUPABASE_URL}/rest/v1/${table}?select=*&limit=10`;
    const res = await fetch(url, { headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}` }});
    if (!res.ok) return null;
    return { table, data: await res.json() };
  } catch { return null; }
}

// ─── Claude API Call ─────────────────────────────────────────
async function callClaude(messages, systemPrompt) {
  if (!CONFIG.ANTHROPIC_KEY) {
    return "⚠️ Anthropic API key not configured. Set CONFIG.ANTHROPIC_KEY to enable AI responses.\n\nI'm the Aberdeen AI Gateway — I can help with recruiting and staffing intelligence once connected to Claude.";
  }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': CONFIG.ANTHROPIC_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: CONFIG.ANTHROPIC_MODEL, max_tokens: 2048, system: systemPrompt, messages })
  });
  if (!res.ok) throw new Error(`Claude API ${res.status}: ${await res.text()}`);
  const data = await res.json();
  return data.content?.[0]?.text || 'No response generated.';
}

// ─── Learning Loop ───────────────────────────────────────────
const learningStore = { routeAccuracy: [], agentSuccess: {}, predictions: [] };
function recordRouting(agentId, wasCorrect) {
  learningStore.routeAccuracy.push({ agentId, correct: wasCorrect, ts: Date.now() });
  if (!learningStore.agentSuccess[agentId]) learningStore.agentSuccess[agentId] = { total: 0, success: 0 };
  learningStore.agentSuccess[agentId].total++;
  if (wasCorrect) learningStore.agentSuccess[agentId].success++;
}

// ─── State Management ────────────────────────────────────────
const initialState = {
  view: 'chat', activeAgent: null, messages: [],
  events: [], dlq: [], policies: POLICIES,
  customAgents: [], sidebarCollapsed: false,
  panelCollapsed: false, panelTab: 'policies',
  showCmdPalette: false, showBuilder: false,
  isLoading: false, totalRequests: 0,
  routingAccuracy: 95.2
};

function reducer(state, action) {
  switch (action.type) {
    case 'SET_AGENT': return { ...state, activeAgent: action.payload, messages: [] };
    case 'ADD_MESSAGE': return { ...state, messages: [...state.messages, action.payload] };
    case 'SET_LOADING': return { ...state, isLoading: action.payload };
    case 'ADD_EVENT': return { ...state, events: [action.payload, ...state.events].slice(0, 50) };
    case 'ADD_DLQ': return { ...state, dlq: [action.payload, ...state.dlq] };
    case 'REMOVE_DLQ': return { ...state, dlq: state.dlq.filter(d => d.id !== action.payload) };
    case 'TOGGLE_POLICY': return { ...state, policies: state.policies.map(p => p.id === action.payload ? { ...p, enabled: !p.enabled } : p) };
    case 'ADD_CUSTOM_AGENT': return { ...state, customAgents: [...state.customAgents, action.payload] };
    case 'TOGGLE_SIDEBAR': return { ...state, sidebarCollapsed: !state.sidebarCollapsed };
    case 'TOGGLE_PANEL': return { ...state, panelCollapsed: !state.panelCollapsed };
    case 'SET_PANEL_TAB': return { ...state, panelTab: action.payload };
    case 'TOGGLE_CMD': return { ...state, showCmdPalette: !state.showCmdPalette };
    case 'TOGGLE_BUILDER': return { ...state, showBuilder: !state.showBuilder };
    case 'CLEAR_SESSION': return { ...state, messages: [], events: [] };
    case 'INCREMENT_REQUESTS': return { ...state, totalRequests: state.totalRequests + 1 };
    default: return state;
  }
}

// ─── Command Palette Component ───────────────────────────────
function CommandPalette({ agents, onSelect, onClose }) {
  const [query, setQuery] = useState('');
  const inputRef = useRef(null);
  const [focusIdx, setFocusIdx] = useState(0);
  useEffect(() => { inputRef.current?.focus(); }, []);
  const filtered = useMemo(() => {
    if (!query) return agents.slice(0, 8);
    const q = query.toLowerCase();
    return agents.filter(a => a.name.toLowerCase().includes(q) || a.tags?.some(t => t.toLowerCase().includes(q)) || a.cat.includes(q)).slice(0, 8);
  }, [query, agents]);
  const handleKey = (e) => {
    if (e.key === 'Escape') onClose();
    if (e.key === 'ArrowDown') { e.preventDefault(); setFocusIdx(i => Math.min(i + 1, filtered.length - 1)); }
    if (e.key === 'ArrowUp') { e.preventDefault(); setFocusIdx(i => Math.max(i - 1, 0)); }
    if (e.key === 'Enter' && filtered[focusIdx]) { onSelect(filtered[focusIdx]); onClose(); }
  };
  return (
    <div className="cmd-overlay" onClick={onClose}>
      <div className="cmd-palette" onClick={e => e.stopPropagation()}>
        <input ref={inputRef} className="cmd-input" placeholder="Search agents... (type a name, technology, or category)" value={query} onChange={e => { setQuery(e.target.value); setFocusIdx(0); }} onKeyDown={handleKey}/>
        <div className="cmd-results">
          {filtered.map((a, i) => (
            <div key={a.id} className={`cmd-result${i === focusIdx ? ' focused' : ''}`} onClick={() => { onSelect(a); onClose(); }} onMouseEnter={() => setFocusIdx(i)}>
              <div className="cmd-icon" style={{background: a.color + '20', color: a.color}}>{a.icon}</div>
              <div><div className="cmd-name">{a.name}</div><div className="cmd-cat">{CATEGORIES.find(c=>c.id===a.cat)?.name}</div></div>
            </div>
          ))}
          {filtered.length === 0 && <div style={{padding:'20px',textAlign:'center',color:'var(--text-muted)',fontSize:'13px'}}>No agents found</div>}
        </div>
      </div>
    </div>
  );
}

// ─── Sidebar Component ───────────────────────────────────────
function Sidebar({ agents, activeAgent, onSelect, collapsed, searchQuery, onSearch }) {
  const grouped = useMemo(() => {
    const q = searchQuery.toLowerCase();
    const filtered = q ? agents.filter(a => a.name.toLowerCase().includes(q) || a.tags?.some(t => t.toLowerCase().includes(q)) || a.kw?.some(k => k.toLowerCase().includes(q))) : agents;
    const groups = {};
    CATEGORIES.forEach(c => { groups[c.id] = filtered.filter(a => a.cat === c.id); });
    return groups;
  }, [agents, searchQuery]);
  const [expandedCats, setExpandedCats] = useState(new Set(CATEGORIES.map(c=>c.id)));
  const toggleCat = (id) => { const next = new Set(expandedCats); next.has(id) ? next.delete(id) : next.add(id); setExpandedCats(next); };
  if (collapsed) return (
    <div className="sidebar" style={{alignItems:'center',paddingTop:12}}>
      {CATEGORIES.map(c => { const count = grouped[c.id]?.length || 0; return count > 0 ? (
        <div key={c.id} title={c.name} style={{fontSize:18,padding:'8px 0',cursor:'pointer',opacity:0.7,transition:'var(--transition)'}} onClick={() => {
          const first = grouped[c.id]?.[0]; if(first) onSelect(first);
        }}>{c.icon}</div>
      ) : null; })}
    </div>
  );
  return (
    <div className="sidebar">
      <div className="sidebar-search"><input placeholder="Filter agents..." value={searchQuery} onChange={e => onSearch(e.target.value)}/></div>
      <div className="sidebar-categories">
        {CATEGORIES.map(cat => {
          const items = grouped[cat.id] || [];
          if (items.length === 0) return null;
          const expanded = expandedCats.has(cat.id);
          return (
            <div key={cat.id} className="sidebar-cat">
              <div className="sidebar-cat-header" onClick={() => toggleCat(cat.id)}>
                <span>{cat.icon}</span><span>{cat.name}</span>
                <span className="count">{items.length}</span>
                <span style={{fontSize:10,opacity:0.5}}>{expanded ? '▾' : '▸'}</span>
              </div>
              {expanded && items.map(agent => (
                <div key={agent.id} className={`agent-item${activeAgent?.id === agent.id ? ' active' : ''}`} onClick={() => onSelect(agent)}>
                  <div className="avatar" style={{background: agent.color + '20', color: agent.color}}>{agent.icon}</div>
                  <div className="info"><div className="name">{agent.name}</div><div className="desc">{agent.desc}</div></div>
                  <span className={`tier tier-${agent.tier}`}>T{agent.tier}</span>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Main App Component ──────────────────────────────────────
function App() {
  const [state, dispatch] = useReducer(reducer, initialState);
  const [searchQuery, setSearchQuery] = useState('');
  const [input, setInput] = useState('');
  const messagesEndRef = useRef(null);
  const textareaRef = useRef(null);
  const allAgents = useMemo(() => [...AGENTS, ...state.customAgents], [state.customAgents]);

  // Auto-scroll messages
  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [state.messages]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); dispatch({type:'TOGGLE_CMD'}); }
      if (e.key === 'Escape') { dispatch({type:'TOGGLE_CMD'}); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  // ─── Execution Spine ─────────────────────────────────────
  const handleSend = useCallback(async () => {
    const msg = input.trim();
    if (!msg || state.isLoading) return;
    setInput('');
    dispatch({type:'SET_LOADING', payload: true});
    dispatch({type:'INCREMENT_REQUESTS'});
    dispatch({type:'ADD_MESSAGE', payload: { role:'user', content: msg, ts: Date.now() }});
    dispatch({type:'ADD_EVENT', payload: { type:'info', text:`User message received (${msg.length} chars)`, ts: Date.now() }});
    try {
      // 1. Auto-route if no agent selected
      let agent = state.activeAgent;
      if (!agent) {
        agent = routeMessage(msg, allAgents);
        if (agent) {
          dispatch({type:'SET_AGENT', payload: agent});
          dispatch({type:'ADD_EVENT', payload: { type:'success', text:`Auto-routed to ${agent.name}`, ts: Date.now() }});
          dispatch({type:'ADD_MESSAGE', payload: { role:'user', content: msg, ts: Date.now() }});
        }
      }
      if (!agent) {
        dispatch({type:'ADD_MESSAGE', payload: { role:'system', content:'No matching agent found. Try selecting one from the sidebar or use ⌘K.', ts: Date.now() }});
        dispatch({type:'SET_LOADING', payload: false});
        return;
      }

      // 2. Policy checks
      let cleanMsg = msg;
      const enabledPolicies = state.policies.filter(p => p.enabled);
      for (const policy of enabledPolicies) {
        const result = policy.check(cleanMsg);
        if (result.violations.length > 0) {
          result.violations.forEach(v => {
            dispatch({type:'ADD_EVENT', payload: { type:'warning', text:`[${policy.name}] ${v}`, ts: Date.now() }});
          });
          if (policy.id === 'prompt-injection' || policy.id === 'financial-block') {
            dispatch({type:'ADD_DLQ', payload: { id: Date.now(), message: msg, reason: result.violations[0], agent: agent.id, ts: Date.now() }});
            dispatch({type:'ADD_MESSAGE', payload: { role:'system', content:`🛡️ Blocked by ${policy.name}: ${result.violations[0]}`, ts: Date.now() }});
            dispatch({type:'SET_LOADING', payload: false});
            return;
          }
          cleanMsg = result.clean;
        }
      }
      // 3. FIN-LOCK check
      const finCheck = FINLOCK.check(cleanMsg);
      if (finCheck.active) {
        finCheck.warnings.forEach(w => {
          dispatch({type:'ADD_EVENT', payload: { type:'error', text:`[FIN-LOCK] ${w}`, ts: Date.now() }});
        });
        dispatch({type:'ADD_MESSAGE', payload: { role:'system', content:`🔐 FIN-LOCK: ${finCheck.warnings.join('; ')}`, ts: Date.now() }});
      }

      // 4. Supabase data bridge
      let contextData = '';
      const sbResult = await querySupabase(cleanMsg);
      if (sbResult) {
        contextData = `\n\n[NorthStar Pipeline Data — ${sbResult.table}]\n${JSON.stringify(sbResult.data.slice(0, 5), null, 2)}`;
        dispatch({type:'ADD_EVENT', payload: { type:'info', text:`Supabase: fetched ${sbResult.data.length} ${sbResult.table} records`, ts: Date.now() }});
      }

      // 5. Build messages and call Claude
      const systemPrompt = `${agent.sys}\n\nYou are part of the Aberdeen AI Gateway, a recruiting intelligence platform by NorthStar. Current agent: ${agent.name} (${agent.cat}). Rate range: ${agent.rate}. Demand: ${agent.demand}.\n\nFIN-LOCK guardrails active: margin floor ${FINLOCK.marginFloor*100}%, rate ceiling $${FINLOCK.rateCeiling}/hr, cost limit $${FINLOCK.costLimit.toLocaleString()}.${contextData}`;
      
      const chatMessages = state.messages.filter(m => m.role !== 'system').map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content }));
      chatMessages.push({ role: 'user', content: cleanMsg });

      dispatch({type:'ADD_EVENT', payload: { type:'info', text:`Calling Claude (${CONFIG.ANTHROPIC_MODEL})...`, ts: Date.now() }});
      const response = await callClaude(chatMessages, systemPrompt);
      
      dispatch({type:'ADD_MESSAGE', payload: { role:'assistant', content: response, ts: Date.now() }});
      dispatch({type:'ADD_EVENT', payload: { type:'success', text:`Response generated (${response.length} chars)`, ts: Date.now() }});
      recordRouting(agent.id, true);

    } catch (err) {
      dispatch({type:'ADD_MESSAGE', payload: { role:'system', content:`❌ Error: ${err.message}`, ts: Date.now() }});
      dispatch({type:'ADD_EVENT', payload: { type:'error', text: err.message, ts: Date.now() }});
    } finally {
      dispatch({type:'SET_LOADING', payload: false});
    }
  }, [input, state.activeAgent, state.isLoading, state.policies, state.messages, allAgents]);
  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  };

  // Auto-resize textarea
  useEffect(() => {
    if (textareaRef.current) {
      textareaRef.current.style.height = 'auto';
      textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 160) + 'px';
    }
  }, [input]);

  const selectAgent = (agent) => {
    dispatch({type:'SET_AGENT', payload: agent});
    dispatch({type:'ADD_EVENT', payload: { type:'info', text:`Switched to ${agent.name}`, ts: Date.now() }});
    textareaRef.current?.focus();
  };

  const clsNames = ['app', state.sidebarCollapsed && 'sidebar-collapsed', state.panelCollapsed && 'panel-collapsed'].filter(Boolean).join(' ');

  return (
    <div className={clsNames}>
      {/* Header */}
      <header className="header">
        <div className="header-brand">
          <button className="btn-icon" onClick={() => dispatch({type:'TOGGLE_SIDEBAR'})}><MenuIcon/></button>
          <div className="header-logo">AG</div>
          <div className="header-title">Aberdeen <em>Gateway</em></div>
        </div>
        <div className="header-status">
          <span className="dot"/><span>v{CONFIG.VERSION}</span>
          <span style={{margin:'0 8px',color:'var(--border)'}}>|</span>
          <span>{allAgents.length} agents</span>
          <span style={{margin:'0 8px',color:'var(--border)'}}>|</span>
          <span>{state.totalRequests} requests</span>
        </div>
        <div className="header-actions">
          <div className="header-kbd" onClick={() => dispatch({type:'TOGGLE_CMD'})}>⌘K</div>
          <button className="btn btn-sm" onClick={() => dispatch({type:'TOGGLE_BUILDER'})}><PlusIcon/> New Agent</button>
          <button className="btn-icon" onClick={() => dispatch({type:'TOGGLE_PANEL'})}><PanelIcon/></button>
        </div>
      </header>
      {/* Sidebar */}
      <Sidebar agents={allAgents} activeAgent={state.activeAgent} onSelect={selectAgent} collapsed={state.sidebarCollapsed} searchQuery={searchQuery} onSearch={setSearchQuery}/>

      {/* Main Chat Area */}
      <main className="main">
        {!state.activeAgent ? (
          <WelcomeScreen onSelectAgent={selectAgent} agents={allAgents}/>
        ) : (
          <>
            <div className="chat-header">
              <div className="agent-icon" style={{background: state.activeAgent.color + '20', color: state.activeAgent.color}}>{state.activeAgent.icon}</div>
              <div className="agent-info">
                <h2>{state.activeAgent.name} <span className="badge">{state.activeAgent.demand}</span></h2>
                <p>{state.activeAgent.desc} · {state.activeAgent.rate}</p>
              </div>
              <div className="chat-header-actions">
                <button className="btn btn-sm" onClick={() => dispatch({type:'CLEAR_SESSION'})}><RefreshIcon/> Clear</button>
              </div>
            </div>
            <div className="messages">
              {state.messages.length === 0 && (
                <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text-muted)'}}>
                  <div style={{fontSize:40,marginBottom:12}}>{state.activeAgent.icon}</div>
                  <div style={{fontSize:15,fontWeight:500,color:'var(--text-secondary)',marginBottom:4}}>Chat with {state.activeAgent.name}</div>
                  <div style={{fontSize:13,maxWidth:400,margin:'0 auto',lineHeight:1.6}}>Ask about talent sourcing, compensation benchmarks, market trends, or candidate evaluation for {state.activeAgent.tags?.slice(0,3).join(', ')} roles.</div>
                </div>
              )}
              {state.messages.map((m, i) => (
                <div key={i} className={`msg ${m.role}`}>
                  <div className="avatar-sm">{m.role === 'user' ? '👤' : m.role === 'system' ? '⚙️' : state.activeAgent?.icon || '🤖'}</div>
                  <div className="bubble">{m.content}</div>
                </div>
              ))}
              {state.isLoading && <div className="typing"><span/><span/><span/></div>}
              <div ref={messagesEndRef}/>
            </div>
            <div className="input-area">
              <div className="input-row">
                <div className="input-field">
                  <textarea ref={textareaRef} rows={1} value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKeyDown} placeholder={`Message ${state.activeAgent.name}...`} disabled={state.isLoading}/>
                </div>
                <button className="send-btn" onClick={handleSend} disabled={!input.trim() || state.isLoading}><SendIcon/></button>
              </div>
              <div className="input-hints">
                <span>↵ Send</span><span>⇧↵ New line</span><span>⌘K Switch agent</span>
                {state.policies.filter(p=>p.enabled).length > 0 && <span style={{color:'var(--success)'}}>🔒 {state.policies.filter(p=>p.enabled).length} policies active</span>}
              </div>
            </div>
          </>
        )}
      </main>

      {/* Right Panel */}
      {!state.panelCollapsed && <RightPanel state={state} dispatch={dispatch}/>}

      {/* Command Palette */}
      {state.showCmdPalette && <CommandPalette agents={allAgents} onSelect={selectAgent} onClose={() => dispatch({type:'TOGGLE_CMD'})}/>}

      {/* Agent Builder */}
      {state.showBuilder && <AgentBuilder onSave={(agent) => dispatch({type:'ADD_CUSTOM_AGENT', payload: agent})} onClose={() => dispatch({type:'TOGGLE_BUILDER'})}/>}
    </div>
  );
}

// ─── Mount ───────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
