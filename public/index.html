<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0b0f">
<title>Aberdeen AI Gateway — NorthStar Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0a0b0f;--bg-secondary:#12141a;--bg-tertiary:#1a1d26;--bg-elevated:#1e2130;
  --text-primary:#e8eaf0;--text-secondary:#8b8fa3;--text-muted:#555873;
  --accent:#00d4aa;--accent-dim:rgba(0,212,170,0.12);--accent-glow:rgba(0,212,170,0.25);
  --danger:#ff4d6a;--warning:#ffb443;--info:#4da6ff;--success:#00d4aa;
  --border:rgba(255,255,255,0.06);--border-active:rgba(0,212,170,0.3);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,0.3);--shadow-lg:0 12px 48px rgba(0,0,0,0.5);
  --font-sans:'DM Sans',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;--font-serif:'Instrument Serif',serif;
  --transition:180ms cubic-bezier(0.4,0,0.2,1);
  --safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);
}
html,body{height:100%;font-family:var(--font-sans);background:var(--bg-primary);color:var(--text-primary);overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
::selection{background:var(--accent);color:var(--bg-primary)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}

/* ── MOBILE-FIRST: Single column layout ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;overflow:hidden}

/* Header — compact on mobile */
.header{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:52px;min-height:52px;background:var(--bg-secondary);border-bottom:1px solid var(--border);z-index:100;padding-top:var(--safe-top)}
.header-brand{display:flex;align-items:center;gap:8px}
.header-logo{width:28px;height:28px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#00a88a);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--bg-primary);letter-spacing:-0.5px}
.header-title{font-family:var(--font-serif);font-size:17px;font-weight:400;letter-spacing:-0.3px}
.header-title em{color:var(--accent);font-style:italic}
.header-status{display:none}
.header-actions{display:flex;align-items:center;gap:6px}
.header-kbd{display:none}
/* Sidebar — slide-over drawer on mobile */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:200;animation:fadeIn 0.2s ease-out}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:85%;max-width:320px;background:var(--bg-secondary);border-right:1px solid var(--border);z-index:201;display:flex;flex-direction:column;animation:slideLeft 0.25s ease-out;padding-top:var(--safe-top)}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.sidebar-header h3{font-size:15px;font-weight:600}
.sidebar-search{padding:12px 16px;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);font-size:15px;font-family:var(--font-sans);outline:none;transition:var(--transition);-webkit-appearance:none}
.sidebar-search input:focus{border-color:var(--border-active);box-shadow:0 0 0 3px var(--accent-dim)}
.sidebar-search input::placeholder{color:var(--text-muted)}
.sidebar-categories{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch}
.sidebar-cat{margin-bottom:4px}
.sidebar-cat-header{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition);min-height:36px}
.sidebar-cat-header:hover{color:var(--text-secondary);background:rgba(255,255,255,0.02)}
.sidebar-cat-header .count{margin-left:auto;font-size:10px;padding:2px 6px;border-radius:10px;background:var(--bg-tertiary);font-weight:500}
.agent-item{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:2px 0;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);position:relative;min-height:48px}
.agent-item:active{background:rgba(255,255,255,0.06)}
.agent-item.active{background:var(--accent-dim);border:1px solid var(--border-active)}
.agent-item .avatar{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.agent-item .info{flex:1;min-width:0}
.agent-item .name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-item .desc{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.agent-item .tier{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;letter-spacing:0.5px}
.tier-1{background:rgba(255,183,77,0.15);color:#ffb74d}
.tier-2{background:rgba(77,166,255,0.15);color:#4da6ff}
.tier-3{background:rgba(139,143,163,0.15);color:#8b8fa3}
/* Main Chat Area — full width on mobile */
.main{flex:1;display:flex;flex-direction:column;background:var(--bg-primary);position:relative;overflow:hidden;min-height:0}
.main::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,var(--accent-dim),transparent 60%);pointer-events:none;opacity:0.3}
.chat-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);position:relative;z-index:1}
.chat-header .agent-icon{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-header .agent-info{flex:1;min-width:0}
.chat-header .agent-info h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-header .agent-info h2 .badge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600;letter-spacing:0.5px;background:var(--accent-dim);color:var(--accent);flex-shrink:0}
.chat-header .agent-info p{font-size:11px;color:var(--text-secondary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-header-actions{display:flex;gap:4px;flex-shrink:0}
/* Messages */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;-webkit-overflow-scrolling:touch}
.msg{max-width:92%;animation:fadeUp 0.3s ease-out;display:flex;gap:8px}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
.msg .avatar-sm{width:26px;height:26px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.msg.user .avatar-sm{background:var(--bg-elevated);color:var(--text-secondary)}
.msg.assistant .avatar-sm{background:var(--accent-dim);color:var(--accent)}
.msg .bubble{padding:10px 14px;border-radius:var(--radius-lg);font-size:14px;line-height:1.6;letter-spacing:-0.1px}
.msg.user .bubble{background:var(--accent);color:var(--bg-primary);border-bottom-right-radius:4px}
.msg.assistant .bubble{background:var(--bg-elevated);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.assistant .bubble code{font-family:var(--font-mono);font-size:12px;background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px}
.msg.system{align-self:center;max-width:95%}
.msg.system .bubble{background:transparent;border:1px dashed var(--border);color:var(--text-muted);font-size:12px;text-align:center;font-family:var(--font-mono)}
.typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:pulse 1.4s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
/* Input — fixed bottom, touch-friendly */
.input-area{padding:12px 12px;padding-bottom:calc(12px + var(--safe-bottom));border-top:1px solid var(--border);position:relative;z-index:1;background:var(--bg-primary)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-field{flex:1;position:relative}
.input-field textarea{width:100%;padding:12px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:16px;font-family:var(--font-sans);resize:none;outline:none;min-height:46px;max-height:120px;line-height:1.5;transition:var(--transition);-webkit-appearance:none}
.input-field textarea:focus{border-color:var(--border-active);box-shadow:0 0 0 3px var(--accent-dim)}
.input-field textarea::placeholder{color:var(--text-muted)}
.send-btn{width:46px;height:46px;border-radius:var(--radius);border:none;background:var(--accent);color:var(--bg-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;-webkit-tap-highlight-color:transparent}
.send-btn:active{transform:scale(0.92)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px}
.input-hints{display:none}

/* Right Panel — bottom sheet on mobile */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:200;animation:fadeIn 0.2s ease-out}
.panel{position:fixed;left:0;right:0;bottom:0;max-height:70vh;background:var(--bg-secondary);border-top:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;z-index:201;display:flex;flex-direction:column;animation:slideUp 0.25s ease-out;padding-bottom:var(--safe-bottom)}
.panel-handle{width:36px;height:4px;border-radius:2px;background:var(--text-muted);margin:8px auto 4px;opacity:0.5}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 4px}
.panel-tab{flex:1;padding:12px 8px;font-size:12px;font-weight:500;color:var(--text-muted);background:transparent;border:none;cursor:pointer;text-align:center;transition:var(--transition);border-bottom:2px solid transparent;min-height:44px}
.panel-tab:active{color:var(--text-secondary)}
.panel-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel-content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
/* Policy, Event, DLQ, Metric cards */
.policy-card{padding:12px;border-radius:var(--radius-sm);background:var(--bg-tertiary);border:1px solid var(--border);margin-bottom:8px}
.policy-card .policy-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.policy-card .policy-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.policy-card .policy-desc{font-size:11px;color:var(--text-muted);line-height:1.5}
.toggle{position:relative;width:36px;height:20px;cursor:pointer;flex-shrink:0}
.toggle input{display:none}
.toggle .slider{position:absolute;inset:0;background:var(--bg-primary);border-radius:10px;border:1px solid var(--border);transition:var(--transition)}
.toggle .slider::before{content:'';position:absolute;width:14px;height:14px;left:2px;bottom:2px;border-radius:50%;background:var(--text-muted);transition:var(--transition)}
.toggle input:checked+.slider{background:var(--accent-dim);border-color:var(--border-active)}
.toggle input:checked+.slider::before{transform:translateX(16px);background:var(--accent)}
.event-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);animation:slideIn 0.3s ease-out}
.event-item:last-child{border-bottom:none}
.event-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.event-item .event-text{font-size:12px;color:var(--text-secondary);line-height:1.5}
.event-item .event-time{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}
.dlq-item{padding:10px;border-radius:var(--radius-sm);background:rgba(255,77,106,0.06);border:1px solid rgba(255,77,106,0.15);margin-bottom:8px}
.dlq-item .dlq-reason{font-size:12px;color:var(--danger);font-weight:500;margin-bottom:4px}
.dlq-item .dlq-msg{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.dlq-item .dlq-actions{display:flex;gap:6px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.metric-card{padding:12px;border-radius:var(--radius-sm);background:var(--bg-tertiary);border:1px solid var(--border)}
.metric-card .metric-value{font-size:20px;font-weight:700;font-family:var(--font-mono);letter-spacing:-1px}
.metric-card .metric-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.finlock-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.8px;font-family:var(--font-mono)}
.finlock-active{background:rgba(255,77,106,0.12);color:var(--danger);border:1px solid rgba(255,77,106,0.25)}
.finlock-clear{background:rgba(0,212,170,0.12);color:var(--success);border:1px solid rgba(0,212,170,0.25)}
/* Command Palette — full screen on mobile */
.cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:10vh;animation:fadeIn 0.15s ease-out}
.cmd-palette{width:calc(100% - 24px);max-width:520px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.cmd-input{width:100%;padding:16px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text-primary);font-size:16px;font-family:var(--font-sans);outline:none;-webkit-appearance:none}
.cmd-input::placeholder{color:var(--text-muted)}
.cmd-results{max-height:50vh;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch}
.cmd-result{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);min-height:48px}
.cmd-result:active,.cmd-result.focused{background:var(--accent-dim)}
.cmd-result .cmd-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cmd-result .cmd-name{font-size:14px;font-weight:500}
.cmd-result .cmd-cat{font-size:11px;color:var(--text-muted)}

/* Agent Builder — full screen on mobile */
.builder-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:900;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.15s ease-out}
.builder{width:100%;max-height:90vh;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;animation:slideUp 0.25s ease-out}
.builder-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.builder-header h3{font-size:16px;font-weight:600}
.builder-steps{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border)}
.builder-step{flex:1;padding:12px 0;font-size:11px;color:var(--text-muted);text-align:center;position:relative;transition:var(--transition)}
.builder-step.active{color:var(--accent)}
.builder-step.done{color:var(--text-secondary)}
.builder-step::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:transparent}
.builder-step.active::after{background:var(--accent)}
.builder-step.done::after{background:var(--text-muted)}
.builder-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.builder-body label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;margin-top:16px}
.builder-body label:first-child{margin-top:0}
.builder-body input,.builder-body textarea,.builder-body select{width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);font-size:15px;font-family:var(--font-sans);outline:none;-webkit-appearance:none}
.builder-body input:focus,.builder-body textarea:focus,.builder-body select:focus{border-color:var(--border-active);box-shadow:0 0 0 3px var(--accent-dim)}
.builder-body textarea{min-height:100px;resize:vertical;font-family:var(--font-mono);font-size:13px}
.builder-footer{padding:16px;padding-bottom:calc(16px + var(--safe-bottom));border-top:1px solid var(--border);display:flex;justify-content:space-between}
/* Buttons — touch-friendly sizes */
.btn{padding:10px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);font-size:14px;font-family:var(--font-sans);cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;gap:6px;font-weight:500;min-height:40px;-webkit-tap-highlight-color:transparent}
.btn:active{background:var(--bg-elevated);border-color:rgba(255,255,255,0.1)}
.btn-primary{background:var(--accent);color:var(--bg-primary);border-color:var(--accent)}
.btn-primary:active{background:#00e8ba}
.btn-danger{color:var(--danger);border-color:rgba(255,77,106,0.3)}
.btn-sm{padding:6px 10px;font-size:12px;min-height:32px}
.btn-icon{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer}
.btn-icon:active{background:var(--bg-tertiary);color:var(--text-primary)}

/* Welcome Screen — mobile optimized */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px 20px;position:relative;z-index:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.welcome h1{font-family:var(--font-serif);font-size:32px;font-weight:400;letter-spacing:-0.5px;margin-bottom:8px}
.welcome h1 em{color:var(--accent);font-style:italic}
.welcome p{color:var(--text-secondary);font-size:14px;max-width:480px;line-height:1.6;margin-bottom:24px}
.welcome-grid{display:grid;grid-template-columns:1fr;gap:10px;width:100%;max-width:400px}
.welcome-card{padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-secondary);text-align:left;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:12px}
.welcome-card:active{border-color:var(--border-active);background:var(--bg-tertiary)}
.welcome-card .wc-icon{font-size:24px;flex-shrink:0}
.welcome-card .wc-text{flex:1}
.welcome-card .wc-title{font-size:14px;font-weight:600;margin-bottom:2px}
.welcome-card .wc-desc{font-size:12px;color:var(--text-muted);line-height:1.4}
.welcome-footer{margin-top:20px;display:flex;flex-wrap:wrap;gap:12px;justify-content:center;font-size:11px;color:var(--text-muted)}

/* Bottom nav bar for mobile */
.bottom-nav{display:flex;align-items:center;justify-content:space-around;background:var(--bg-secondary);border-top:1px solid var(--border);padding:6px 0;padding-bottom:calc(6px + var(--safe-bottom));min-height:52px}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text-muted);font-size:10px;font-family:var(--font-sans);cursor:pointer;padding:4px;min-height:44px;justify-content:center;-webkit-tap-highlight-color:transparent}
.bottom-nav button.active{color:var(--accent)}
.bottom-nav button svg{width:20px;height:20px}
/* ── TABLET: 768px+ ── */
@media(min-width:768px){
  .welcome h1{font-size:38px}
  .welcome-grid{grid-template-columns:1fr 1fr;max-width:500px}
  .welcome-card{flex-direction:column;align-items:flex-start;gap:0}
  .welcome-card .wc-icon{margin-bottom:8px}
  .cmd-palette{width:480px}
  .builder{width:90%;max-width:600px;border-radius:var(--radius-lg);margin-bottom:5vh}
  .builder-overlay{align-items:center}
  .msg{max-width:80%}
  .input-hints{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--text-muted)}
  .input-hints span{display:flex;align-items:center;gap:4px}
}

  return isDesktop;
}

// ─── Command Palette ─────────────────────────────────────────
function CommandPalette({agents,onSelect,onClose}){
  const [query,setQuery]=useState(''); const inputRef=useRef(null); const [fi,setFi]=useState(0);
  useEffect(()=>{inputRef.current?.focus()},[]);
  const filtered=useMemo(()=>{if(!query)return agents.slice(0,8);const q=query.toLowerCase();return agents.filter(a=>a.name.toLowerCase().includes(q)||a.tags?.some(t=>t.toLowerCase().includes(q))||a.cat.includes(q)).slice(0,8)},[query,agents]);
  const handleKey=(e)=>{if(e.key==='Escape')onClose();if(e.key==='ArrowDown'){e.preventDefault();setFi(i=>Math.min(i+1,filtered.length-1))}if(e.key==='ArrowUp'){e.preventDefault();setFi(i=>Math.max(i-1,0))}if(e.key==='Enter'&&filtered[fi]){onSelect(filtered[fi]);onClose()}};
  return(<div className="cmd-overlay" onClick={onClose}><div className="cmd-palette" onClick={e=>e.stopPropagation()}>
    <input ref={inputRef} className="cmd-input" placeholder="Search agents..." value={query} onChange={e=>{setQuery(e.target.value);setFi(0)}} onKeyDown={handleKey}/>
    <div className="cmd-results">{filtered.map((a,i)=>(<div key={a.id} className={`cmd-result${i===fi?' focused':''}`} onClick={()=>{onSelect(a);onClose()}} onMouseEnter={()=>setFi(i)}>
      <div className="cmd-icon" style={{background:a.color+'20',color:a.color}}>{a.icon}</div>
      <div><div className="cmd-name">{a.name}</div><div className="cmd-cat">{CATEGORIES.find(c=>c.id===a.cat)?.name}</div></div>
    </div>))}{filtered.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:14}}>No agents found</div>}</div>
  </div></div>);
}

// ─── Agent Builder ───────────────────────────────────────────
function AgentBuilder({onSave,onClose}){
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({name:'',icon:'🤖',color:'#00d4aa',cat:'enterprise-platforms',tier:2,desc:'',sys:'',kw:'',tags:'',rate:'$50-100/hr',demand:'Medium'});
  const steps=['Identity','Prompt','Routing','Review'];
  const set=(k,v)=>setForm({...form,[k]:v});
  const save=()=>{const a={...form,id:'custom-'+Date.now(),kw:form.kw.split(',').map(s=>s.trim()).filter(Boolean),tags:form.tags.split(',').map(s=>s.trim()).filter(Boolean),metrics:{placements:0,avgTime:0,satisfaction:0},related:[]};onSave(a);onClose()};
  return(<div className="builder-overlay" onClick={onClose}><div className="builder" onClick={e=>e.stopPropagation()}>
    <div className="builder-header"><h3>✨ New Agent</h3><button className="btn-icon" onClick={onClose}><XIcon/></button></div>
    <div className="builder-steps">{steps.map((s,i)=><div key={s} className={`builder-step${i===step?' active':''}${i<step?' done':''}`}>{i+1}. {s}</div>)}</div>
    <div className="builder-body">
      {step===0&&<><label>Agent Name</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. Kubernetes Specialist"/><label>Icon</label><input value={form.icon} onChange={e=>set('icon',e.target.value)} maxLength={4}/><label>Color</label><input type="color" value={form.color} onChange={e=>set('color',e.target.value)} style={{height:40,padding:2}}/><label>Category</label><select value={form.cat} onChange={e=>set('cat',e.target.value)}>{CATEGORIES.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select><label>Description</label><input value={form.desc} onChange={e=>set('desc',e.target.value)} placeholder="Brief description"/></>}
      {step===1&&<><label>System Prompt</label><textarea value={form.sys} onChange={e=>set('sys',e.target.value)} placeholder="You are a specialist in..." rows={6}/><label>Rate Range</label><input value={form.rate} onChange={e=>set('rate',e.target.value)}/><label>Demand</label><select value={form.demand} onChange={e=>set('demand',e.target.value)}><option>Low</option><option>Medium</option><option>High</option><option>Very High</option></select></>}
      {step===2&&<><label>Keywords (comma-separated)</label><textarea value={form.kw} onChange={e=>set('kw',e.target.value)} placeholder="kubernetes, k8s, helm" rows={3}/><label>Tags (comma-separated)</label><textarea value={form.tags} onChange={e=>set('tags',e.target.value)} placeholder="K8s, Containers" rows={2}/></>}
      {step===3&&<div style={{fontSize:14,lineHeight:1.8}}><p><strong>{form.icon} {form.name||'Unnamed'}</strong></p><p style={{color:'var(--text-muted)'}}>{form.desc}</p><p style={{marginTop:8}}>Cat: {CATEGORIES.find(c=>c.id===form.cat)?.name} · T{form.tier} · {form.rate}</p><p style={{marginTop:8,padding:12,borderRadius:'var(--radius-sm)',background:'var(--bg-tertiary)',fontFamily:'var(--font-mono)',fontSize:12,whiteSpace:'pre-wrap'}}>{form.sys||'No prompt'}</p></div>}
    </div>
    <div className="builder-footer"><button className="btn" onClick={()=>step>0?setStep(step-1):onClose()}>{step===0?'Cancel':'← Back'}</button>{step<3?<button className="btn btn-primary" onClick={()=>setStep(step+1)}>Next →</button>:<button className="btn btn-primary" onClick={save}>Deploy</button>}</div>
  </div></div>);
}

// ─── Sidebar (Drawer on mobile, column on desktop) ──────────
function Sidebar({agents,activeAgent,onSelect,onClose,searchQuery,onSearch}){
  const grouped=useMemo(()=>{const q=searchQuery.toLowerCase();const f=q?agents.filter(a=>a.name.toLowerCase().includes(q)||a.tags?.some(t=>t.toLowerCase().includes(q))):agents;const g={};CATEGORIES.forEach(c=>{g[c.id]=f.filter(a=>a.cat===c.id)});return g},[agents,searchQuery]);
  const [expanded,setExpanded]=useState(new Set(CATEGORIES.map(c=>c.id)));
  const toggle=(id)=>{const n=new Set(expanded);n.has(id)?n.delete(id):n.add(id);setExpanded(n)};
  return(<div className="sidebar">
    <div className="sidebar-header"><h3>Agents</h3><button className="btn-icon" onClick={onClose}><XIcon/></button></div>
    <div className="sidebar-search"><input placeholder="Filter agents..." value={searchQuery} onChange={e=>onSearch(e.target.value)}/></div>
    <div className="sidebar-categories">{CATEGORIES.map(cat=>{const items=grouped[cat.id]||[];if(!items.length)return null;const exp=expanded.has(cat.id);return(<div key={cat.id} className="sidebar-cat">
      <div className="sidebar-cat-header" onClick={()=>toggle(cat.id)}><span>{cat.icon}</span><span>{cat.name}</span><span className="count">{items.length}</span><span style={{fontSize:10,opacity:0.5}}>{exp?'▾':'▸'}</span></div>
      {exp&&items.map(agent=>(<div key={agent.id} className={`agent-item${activeAgent?.id===agent.id?' active':''}`} onClick={()=>onSelect(agent)}>
        <div className="avatar" style={{background:agent.color+'20',color:agent.color}}>{agent.icon}</div>
        <div className="info"><div className="name">{agent.name}</div><div className="desc">{agent.desc}</div></div>
        <span className={`tier tier-${agent.tier}`}>T{agent.tier}</span>
      </div>))}
    </div>)})}</div>
  </div>);
}

      {panelTab==='events'&&(events.length===0?<div style={{textAlign:'center',padding:40,color:'var(--text-muted)',fontSize:13}}>No events yet.</div>:events.map((ev,i)=>(<div key={i} className="event-item"><div className="event-dot" style={{background:ev.type==='error'?'var(--danger)':ev.type==='warning'?'var(--warning)':ev.type==='success'?'var(--success)':'var(--info)'}}/><div><div className="event-text">{ev.text}</div><div className="event-time">{new Date(ev.ts).toLocaleTimeString()}</div></div></div>)))}
      {panelTab==='dlq'&&(dlq.length===0?<div style={{textAlign:'center',padding:40,color:'var(--text-muted)',fontSize:13}}>DLQ empty.</div>:dlq.map(d=>(<div key={d.id} className="dlq-item"><div className="dlq-reason">⚠ {d.reason}</div><div className="dlq-msg">"{d.message.slice(0,60)}..."</div><div className="dlq-actions"><button className="btn btn-sm" onClick={()=>dispatch({type:'REMOVE_DLQ',payload:d.id})}><RefreshIcon/> Replay</button><button className="btn btn-sm btn-danger" onClick={()=>dispatch({type:'REMOVE_DLQ',payload:d.id})}><TrashIcon/> Discard</button></div></div>)))}
      {panelTab==='metrics'&&<><div className="metric-grid">

        <div className="metric-card"><div className="metric-value" style={{color:'var(--warning)'}}>{allAgents.length}</div><div className="metric-label">Agents</div></div>
        <div className="metric-card"><div className="metric-value" style={{color:'var(--success)'}}>{state.dlq.length}</div><div className="metric-label">DLQ</div></div>
      </div>
      {activeAgent&&<><h4 style={{fontSize:13,fontWeight:600,marginBottom:12}}>Agent Performance</h4><div className="metric-grid">
        <div className="metric-card"><div className="metric-value">{activeAgent.metrics?.placements||0}</div><div className="metric-label">Placements</div></div>
        <div className="metric-card"><div className="metric-value">{activeAgent.metrics?.avgTime||0}d</div><div className="metric-label">Avg Fill</div></div>

// ─── Main App ────────────────────────────────────────────────
function App(){
  const [state,dispatch]=useReducer(reducer,initialState);
  const [searchQuery,setSearchQuery]=useState('');
  const [input,setInput]=useState('');
  const messagesEndRef=useRef(null);
  const textareaRef=useRef(null);
  const isDesktop=useIsDesktop();
  const allAgents=useMemo(()=>[...AGENTS,...state.customAgents],[state.customAgents]);

  useEffect(()=>{messagesEndRef.current?.scrollIntoView({behavior:'smooth'})},[state.messages]);
  useEffect(()=>{const h=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();dispatch({type:'TOGGLE_CMD'})}if(e.key==='Escape'){if(state.showCmdPalette)dispatch({type:'TOGGLE_CMD'});if(state.showSidebar)dispatch({type:'CLOSE_SIDEBAR'});if(state.showPanel)dispatch({type:'CLOSE_PANEL'})}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[state.showCmdPalette,state.showSidebar,state.showPanel]);
  useEffect(()=>{if(textareaRef.current){textareaRef.current.style.height='auto';textareaRef.current.style.height=Math.min(textareaRef.current.scrollHeight,120)+'px'}},[input]);

  // ─── Execution Spine ─────────────────────────────────────
  const handleSend=useCallback(async()=>{
    const msg=input.trim();if(!msg||state.isLoading)return;
    setInput('');dispatch({type:'SET_LOADING',payload:true});dispatch({type:'INCREMENT_REQUESTS'});
    dispatch({type:'ADD_MESSAGE',payload:{role:'user',content:msg,ts:Date.now()}});
    dispatch({type:'ADD_EVENT',payload:{type:'info',text:`Message (${msg.length} chars)`,ts:Date.now()}});
    try{
      let agent=state.activeAgent;
      if(!agent){agent=routeMessage(msg,allAgents);if(agent){dispatch({type:'SET_AGENT',payload:agent});dispatch({type:'ADD_EVENT',payload:{type:'success',text:`Routed → ${agent.name}`,ts:Date.now()}});dispatch({type:'ADD_MESSAGE',payload:{role:'user',content:msg,ts:Date.now()}})}}
      if(!agent){dispatch({type:'ADD_MESSAGE',payload:{role:'system',content:'No matching agent. Open the sidebar to pick one.',ts:Date.now()}});dispatch({type:'SET_LOADING',payload:false});return}
      let cleanMsg=msg;
      for(const p of state.policies.filter(p=>p.enabled)){const r=p.check(cleanMsg);if(r.violations.length>0){r.violations.forEach(v=>dispatch({type:'ADD_EVENT',payload:{type:'warning',text:`[${p.name}] ${v}`,ts:Date.now()}}));if(p.id==='prompt-injection'||p.id==='financial-block'){dispatch({type:'ADD_DLQ',payload:{id:Date.now(),message:msg,reason:r.violations[0],agent:agent.id,ts:Date.now()}});dispatch({type:'ADD_MESSAGE',payload:{role:'system',content:`🛡️ Blocked: ${r.violations[0]}`,ts:Date.now()}});dispatch({type:'SET_LOADING',payload:false});return}cleanMsg=r.clean}}
      const fin=FINLOCK.check(cleanMsg);if(fin.active){fin.warnings.forEach(w=>dispatch({type:'ADD_EVENT',payload:{type:'error',text:`[FIN-LOCK] ${w}`,ts:Date.now()}}));dispatch({type:'ADD_MESSAGE',payload:{role:'system',content:`🔐 ${fin.warnings.join('; ')}`,ts:Date.now()}})}
      let ctx='';const sb=await querySupabase(cleanMsg);if(sb){ctx=`\n\n[Pipeline: ${sb.table}]\n${JSON.stringify(sb.data.slice(0,5),null,2)}`;dispatch({type:'ADD_EVENT',payload:{type:'info',text:`Supabase: ${sb.data.length} ${sb.table}`,ts:Date.now()}})}
      const sysPr=`${agent.sys}\n\nAberdeen AI Gateway. Agent: ${agent.name} (${agent.cat}). Rate: ${agent.rate}. Demand: ${agent.demand}.\nFIN-LOCK: floor ${FINLOCK.marginFloor*100}%, ceiling $${FINLOCK.rateCeiling}/hr, limit $${FINLOCK.costLimit.toLocaleString()}.${ctx}`;
      const chatMsgs=state.messages.filter(m=>m.role!=='system').map(m=>({role:m.role==='user'?'user':'assistant',content:m.content}));chatMsgs.push({role:'user',content:cleanMsg});
      dispatch({type:'ADD_EVENT',payload:{type:'info',text:`Calling Claude...`,ts:Date.now()}});
      const response=await callClaude(chatMsgs,sysPr);
      dispatch({type:'ADD_MESSAGE',payload:{role:'assistant',content:response,ts:Date.now()}});
      dispatch({type:'ADD_EVENT',payload:{type:'success',text:`Response (${response.length} chars)`,ts:Date.now()}});
    }catch(err){dispatch({type:'ADD_MESSAGE',payload:{role:'system',content:`❌ ${err.message}`,ts:Date.now()}});dispatch({type:'ADD_EVENT',payload:{type:'error',text:err.message,ts:Date.now()}})}
    finally{dispatch({type:'SET_LOADING',payload:false})}
  },[input,state.activeAgent,state.isLoading,state.policies,state.messages,allAgents]);

  const handleKeyDown=(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend()}};
  const selectAgent=(a)=>{dispatch({type:'SET_AGENT',payload:a});dispatch({type:'ADD_EVENT',payload:{type:'info',text:`→ ${a.name}`,ts:Date.now()}});textareaRef.current?.focus()};
  const showSidebar=isDesktop||state.showSidebar;
  const showPanel=isDesktop?state.showPanel:state.showPanel;

  return(
    <div className={`app${showPanel&&isDesktop?' panel-open':''}`}>
      {/* Header */}
      <header className="header">
        <div className="header-brand">
          {!isDesktop&&<button className="btn-icon" onClick={()=>dispatch({type:'TOGGLE_SIDEBAR'})} style={{border:'none'}}><MenuIcon/></button>}
          <div className="header-logo">AG</div>
          <div className="header-title">Aberdeen <em>Gateway</em></div>
        </div>
        <div className="header-status"><span className="dot" style={{width:6,height:6,borderRadius:'50%',background:'var(--success)',animation:'pulse 2s ease-in-out infinite'}}/><span>v{CONFIG.VERSION}</span><span style={{margin:'0 8px',color:'var(--border)'}}>|</span><span>{allAgents.length} agents</span></div>
        <div className="header-actions">
          <div className="header-kbd" onClick={()=>dispatch({type:'TOGGLE_CMD'})}>⌘K</div>
          <button className="btn btn-sm" onClick={()=>dispatch({type:'TOGGLE_BUILDER'})}><PlusIcon/> <span style={{display:isDesktop?'inline':'none'}}>New</span></button>
          {isDesktop&&<button className="btn-icon" onClick={()=>dispatch({type:'TOGGLE_PANEL'})}><PanelIcon/></button>}
        </div>
      </header>

      {/* Sidebar — drawer on mobile, persistent on desktop */}
      {showSidebar && <>
        {!isDesktop && <div className="sidebar-overlay" onClick={()=>dispatch({type:'CLOSE_SIDEBAR'})}/>}
        <Sidebar agents={allAgents} activeAgent={state.activeAgent} onSelect={selectAgent} onClose={()=>dispatch({type:'CLOSE_SIDEBAR'})} searchQuery={searchQuery} onSearch={setSearchQuery}/>
      </>}

      {/* Main Chat */}
      <main className="main">
        {!state.activeAgent ? <WelcomeScreen onSelectAgent={selectAgent} agents={allAgents}/> : <>
          <div className="chat-header">
            <div className="agent-icon" style={{background:state.activeAgent.color+'20',color:state.activeAgent.color}}>{state.activeAgent.icon}</div>
            <div className="agent-info"><h2>{state.activeAgent.name} <span className="badge">{state.activeAgent.demand}</span></h2><p>{state.activeAgent.desc}</p></div>
            <div className="chat-header-actions"><button className="btn btn-sm" onClick={()=>dispatch({type:'CLEAR_SESSION'})}><RefreshIcon/></button></div>
          </div>
          <div className="messages">
            {state.messages.length===0&&<div style={{textAlign:'center',padding:'40px 20px',color:'var(--text-muted)'}}>
              <div style={{fontSize:36,marginBottom:8}}>{state.activeAgent.icon}</div>
              <div style={{fontSize:14,fontWeight:500,color:'var(--text-secondary)'}}>Chat with {state.activeAgent.name}</div>
              <div style={{fontSize:13,maxWidth:300,margin:'8px auto 0',lineHeight:1.5}}>Ask about talent, comp benchmarks, or market trends for {state.activeAgent.tags?.slice(0,3).join(', ')} roles.</div>
            </div>}
            {state.messages.map((m,i)=>(<div key={i} className={`msg ${m.role}`}>
              <div className="avatar-sm">{m.role==='user'?'👤':m.role==='system'?'⚙️':state.activeAgent?.icon||'🤖'}</div>
              <div className="bubble">{m.content}</div>
            </div>))}
            {state.isLoading&&<div className="typing"><span/><span/><span/></div>}
            <div ref={messagesEndRef}/>
          </div>
          <div className="input-area">
            <div className="input-row">
              <div className="input-field"><textarea ref={textareaRef} rows={1} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKeyDown} placeholder={`Message ${state.activeAgent.name}...`} disabled={state.isLoading}/></div>
              <button className="send-btn" onClick={handleSend} disabled={!input.trim()||state.isLoading}><SendIcon/></button>
            </div>
            <div className="input-hints"><span>↵ Send</span><span>⇧↵ New line</span></div>
          </div>
        </>}
      </main>

      {/* Right Panel — bottom sheet on mobile, column on desktop */}
      {showPanel && <>
        {!isDesktop && <div className="panel-overlay" onClick={()=>dispatch({type:'CLOSE_PANEL'})}/>}
        <RightPanel state={state} dispatch={dispatch} onClose={()=>dispatch({type:'CLOSE_PANEL'})}/>
      </>}

      {/* Bottom nav — mobile only */}
      {!isDesktop && <nav className="bottom-nav">
        <button className={state.showSidebar?'active':''} onClick={()=>dispatch({type:'TOGGLE_SIDEBAR'})}><AgentsIcon/><span>Agents</span></button>
        <button onClick={()=>dispatch({type:'TOGGLE_CMD'})}><SearchIcon/><span>Search</span></button>
        <button className={state.activeAgent&&!state.showPanel?'active':''} onClick={()=>{if(!state.activeAgent){dispatch({type:'TOGGLE_SIDEBAR'})}}}><ChatIcon/><span>Chat</span></button>
        <button className={state.showPanel?'active':''} onClick={()=>dispatch({type:'TOGGLE_PANEL'})}><SettingsIcon/><span>Settings</span></button>
      </nav>}

      {/* Overlays */}
      {state.showCmdPalette && <CommandPalette agents={allAgents} onSelect={selectAgent} onClose={()=>dispatch({type:'TOGGLE_CMD'})}/>}
      {state.showBuilder && <AgentBuilder onSave={(a)=>dispatch({type:'ADD_CUSTOM_AGENT',payload:a})} onClose={()=>dispatch({type:'TOGGLE_BUILDER'})}/>}
    </div>
  );
}

// ─── Mount ───────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
