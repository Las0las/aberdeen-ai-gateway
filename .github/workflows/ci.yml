name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Lint HTML
        run: htmlhint public/index.html

      - name: Check JS syntax
        run: |
          node --check public/js/utils.js
          node --check public/js/agents.js
          node --check public/js/policies.js
      - name: Verify file structure
        run: |
          test -f public/index.html
          test -f public/js/utils.js
          test -f public/js/agents.js
          test -f public/js/policies.js
          test -f public/js/components.jsx
          test -f api/chat.js
          echo "✅ All required files present"

  smoke-test:
    name: Smoke Test (Post-Deploy)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for Vercel deploy
        run: sleep 30

      - name: Check site responds
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aberdeen-ai-gateway.vercel.app)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Site returned $STATUS"
            exit 1
          fi
          echo "✅ Site is live"

      - name: Check JS modules load
        run: |
          for file in js/utils.js js/agents.js js/policies.js js/components.jsx; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://aberdeen-ai-gateway.vercel.app/$file")
            echo "$file: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "❌ $file returned $STATUS"
              exit 1
            fi
          done
          echo "✅ All JS modules accessible"